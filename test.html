<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Gauge Test</title>
    <style>
        .bmi-container { 
            text-align: center; 
            font-family: sans-serif; 
            margin-top: 50px;
        }

        .gauge-wrapper {
            position: relative;
            width: 400px;
            height: 200px;
            margin: 0 auto 30px auto;
        }

        .bmi-rate-bg {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        #bmiPointer {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 100px;
            height: auto;
            transform-origin: bottom center;
            transition: transform 0.3s ease-out;
            z-index: 10;
            /* FIX 1: We need to handle centering differently */
            transform: translateX(-50%) rotate(0deg);
        }
    </style>
</head>
<body>

<div class="bmi-container">
    <div class="gauge-wrapper">
        <img class="bmi-rate-bg" src="icons/the rate.png" alt="BMI rate">
        <img id="bmiPointer" src="icons/the body mass index.png" alt="BMI Pointer">
    </div>

    <div>
        <label for="bmiInput">Adjust BMI: <span id="bmiValue">25</span></label>
        <br>
        <input type="range" id="bmiInput" min="15" max="35" value="25" step="0.1" style="width: 250px;">
    </div>
</div>

<script>
const bmiInput = document.getElementById('bmiInput');
const bmiValueText = document.getElementById('bmiValue');
const bmiPointer = document.getElementById('bmiPointer');

const minBMI = 15;
const maxBMI = 35;
const minDegrees = -90;
const maxDegrees = 90;

function updateGauge() {
    const currentBMI = parseFloat(bmiInput.value);
    bmiValueText.textContent = currentBMI;

    const percentage = (currentBMI - minBMI) / (maxBMI - minBMI);
    const targetDegrees = minDegrees + (percentage * (maxDegrees - minDegrees));

    /* FIX 2: The main problem was here - we need to properly set the transform
       with translateX first, then rotate, and ensure we're not overriding
       the transform-origin that's set in CSS */
    bmiPointer.style.transform = `translateX(-50%) rotate(${targetDegrees}deg)`;
}

bmiInput.addEventListener('input', updateGauge);
updateGauge();
</script>

</body>
</html>
